syntax  = "proto3";
package it.sdp2025.proto;

option java_multiple_files = true;
option java_package = "it.sdp2025.proto";
option java_outer_classname = "AdminApiProto";

message PlantRegistrationRequest{
  string id = 1;
  int32 port = 2;
}

message plantInfo{
  string id = 1;
  string host = 2;
  int32 port = 3;
}

message PlantList {
  repeated plantInfo plants = 1;
}

message AvgRequest {
  int64 from = 1;
  int64 to = 2;
}

message AvgResponse {
  double value = 1;
}