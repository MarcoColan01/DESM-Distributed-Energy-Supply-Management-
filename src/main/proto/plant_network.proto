syntax = "proto3";

package it.sdp2025.proto;

import "google/protobuf/empty.proto";

option java_package = "it.sdp2025.proto";
option java_multiple_files = true;

// ---- Messaggi ring Chang-Roberts ----
message ElectionMsg {
  string candidateId = 1;
  double price = 2;
}

message ElectedMsg {
  string coordinatorId = 1;
}

// ---- Presentazione nuovo nodo ----
message HelloMsg {
  string id = 1;
  string host = 2;
  int32 port = 3;
}

// ---- Servizio bidirezionale ----
service PlantRing {
  // Canale long-lived per Election & Elected
  rpc ringStream(stream ElectionEnvelope) returns (stream ElectionEnvelope);

  // Semplice RPC unidirezionale per presentarsi
  rpc hello(HelloMsg) returns (google.protobuf.Empty);
}

// Busta per multiplexare in un unico stream
message ElectionEnvelope {
  oneof payload {
    ElectionMsg election = 1;
    ElectedMsg elected = 2;
  }
}
