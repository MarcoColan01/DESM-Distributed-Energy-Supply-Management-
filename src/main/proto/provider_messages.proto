syntax = "proto3";
package it.sdp2025.proto;

option java_multiple_files = true;
option java_package = "it.sdp2025.proto";
option java_outer_classname = "ProviderMessagesProto";

message EnergyRequest {
  string requestId = 1;
  int32  kwh       = 2;
  int64  timestamp = 3;
}

message Co2Average {
  double avg       = 1;
  int64  timestamp = 2;
}
message Co2AverageList {
  string plantId            = 1;
  repeated Co2Average avgs   = 2;
  int64  creationTimestamp   = 3;
}
